<h2>Redefinir senha — Dash Finanças</h2>
<p>Clique no botão abaixo para criar uma nova senha:</p>
<p>
  <a
    href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=recovery&next=/login/redefinir-senha"
  >
    Redefinir minha senha
  </a>
</p>
<p>Se o botão não funcionar, copie e cole este link no navegador:</p>
<p>
  {{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=recovery&next=/login/redefinir-senha
</p>
